# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Firebase
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DURGA_SAREES }}
        run: |
          date > www/build-time.txt
          VERSION=$(git rev-parse --short HEAD)
          echo "{\"version\": \"$VERSION\", \"url\": \"https://durga-sarees.web.app/update.zip\"}" > www/version.json
          
          cd www
          zip -r ../update.zip .
          mv ../update.zip .
          cd ..
          
          echo "$SA_JSON" > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=sa.json
          OUTPUT=$(npx firebase-tools deploy --only hosting --project durga-sarees --non-interactive -m "Auto-deployed via GitHub Actions" 2>&1) || EXIT_CODE=$?
          echo "$OUTPUT"
          if [ "${EXIT_CODE:-0}" -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "is the current active version"; then
              echo "✅ Caught known Firebase identical version API bug. The deployment was actually successful!"
            else
              echo "❌ Deployment failed with error code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi
          rm sa.json
